<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fossil Map — Edu's Prehistoric Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    body { overflow: hidden; height: 100vh; }

    /* ── MAPA ── */
    #mapa {
      position: fixed;
      inset: 0;
      top: 54px;
      bottom: 0;
      z-index: 0;
      filter: saturate(0.7) brightness(0.85);
    }

    /* Oscurecer tiles para que encaje con el tema */
    .leaflet-tile { filter: invert(1) hue-rotate(180deg) saturate(0.6) brightness(0.75); }

    /* ── CONTROLES SUPERIORES ── */
    #controles {
      position: fixed;
      top: 70px;
      left: 1.5rem;
      z-index: 200;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      max-width: 600px;
    }

    .filtro-btn {
      background: rgba(10,12,15,0.88);
      border: 1px solid var(--borde);
      color: var(--texto-apagado);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Crimson Pro', serif;
      font-size: 0.8rem;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .filtro-btn:hover { border-color: var(--acento); color: var(--acento); }
    .filtro-btn.activo { border-color: var(--acento); color: var(--acento); background: rgba(200,164,90,0.1); }

    /* ── CONTADOR ── */
    #contador {
      position: fixed;
      top: 70px;
      right: 1.5rem;
      z-index: 200;
      background: rgba(10,12,15,0.88);
      border: 1px solid var(--borde);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.78rem;
      color: var(--texto-apagado);
      backdrop-filter: blur(8px);
    }
    #contador span { color: var(--acento); font-weight: 600; }

    /* ── MARCADORES CUSTOM ── */
    .marker-custom {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 8px currentColor;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .marker-custom:hover { transform: scale(1.5); }

    /* ── PANEL LATERAL ── */
    #panel {
      position: fixed;
      top: 54px;
      right: 0;
      bottom: 0;
      z-index: 300;
      width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--borde);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--borde) transparent;
    }
    #panel.visible { transform: translateX(0); }

    .panel-foto {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .panel-foto-fallback {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .panel-body { padding: 1.5rem; }

    .panel-era-badge {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.15rem 0.6rem;
      border-radius: 2px;
      border: 1px solid;
      margin-bottom: 0.8rem;
    }
    .panel-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }
    .panel-pais {
      font-size: 0.82rem;
      color: var(--texto-apagado);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .panel-divisor {
      height: 1px;
      background: var(--borde);
      margin: 1rem 0;
    }
    .panel-seccion {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--acento);
      margin-bottom: 0.6rem;
    }
    .panel-desc {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--texto-apagado);
      margin-bottom: 1.2rem;
    }
    .hallazgo-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.84rem;
      color: var(--texto-apagado);
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--borde);
      line-height: 1.4;
    }
    .hallazgo-item:last-child { border-bottom: none; }
    .hallazgo-emoji { font-size: 1rem; flex-shrink: 0; }

    .panel-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      font-size: 0.82rem;
      color: var(--acento);
      border: 1px solid rgba(200,164,90,0.3);
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .panel-link:hover { background: rgba(200,164,90,0.08); }

    .panel-cerrar {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(10,12,15,0.7);
      border: 1px solid var(--borde);
      color: var(--texto-apagado);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }
    .panel-cerrar:hover { border-color: var(--acento); color: var(--acento); }

    /* ── LEYENDA ── */
    #leyenda {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 200;
      background: rgba(10,12,15,0.88);
      border: 1px solid var(--borde);
      border-radius: 6px;
      padding: 0.8rem 1rem;
      backdrop-filter: blur(8px);
      font-size: 0.75rem;
    }
    .ley-titulo { color: var(--texto-apagado); font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .ley-item { display: flex; align-items: center; gap: 0.5rem; color: var(--texto-apagado); margin-bottom: 0.3rem; }
    .ley-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Popup Leaflet custom */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--borde) !important;
      border-radius: 6px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
      color: var(--texto) !important;
      font-family: 'Crimson Pro', serif !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 0.8rem 1rem !important; font-size: 0.88rem !important; }
    .popup-nombre { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; }
    .popup-pais { font-size: 0.75rem; color: var(--texto-apagado); margin-bottom: 0.4rem; }
    .popup-btn {
      display: inline-block; margin-top: 0.5rem;
      font-size: 0.75rem; color: var(--acento); cursor: pointer;
      border-bottom: 1px dashed rgba(200,164,90,0.4);
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html"><span>🦕</span> Edu's Prehistoric Explorer</a>
  <ul class="nav-links">
    <li><a href="../explorer/index.html"   id="nav-explorer"></a></li>
    <li><a href="../landscapes/index.html" id="nav-landscapes"></a></li>
    <li><a href="../fossil/index.html"     id="nav-fossil"></a></li>
    <li><a href="../gallery/index.html"    id="nav-gallery"></a></li>
    <li><a href="../news/index.html"       id="nav-news"></a></li>
    <li><a href="../books/index.html"      id="nav-books"></a></li>
    <li><a href="../updates/index.html"    id="nav-updates"></a></li>
    <li><a href="../comparator/index.html" id="nav-comparator"></a></li>
    <li><a href="../timeline/index.html"   id="nav-timeline"></a></li>
    <li><a href="index.html" class="activo" id="nav-fossilmap"></a></li>
  </ul>
  <div class="selector-idioma">
    <button class="btn-idioma" onclick="setLang('es')">ES</button>
    <button class="btn-idioma" onclick="setLang('fr')">FR</button>
  </div>
  <button class="btn-modo" id="btn-modo" onclick="toggleModo()" title="Cambiar modo"></button>
</nav>

<div id="mapa"></div>

<div id="controles">
  <button class="filtro-btn activo" onclick="filtrar('todos',this)">Todos</button>
  <button class="filtro-btn" onclick="filtrar('Triásico',this)">Triásico</button>
  <button class="filtro-btn" onclick="filtrar('Jurásico',this)">Jurásico</button>
  <button class="filtro-btn" onclick="filtrar('Cretácico',this)">Cretácico</button>
  <button class="filtro-btn" onclick="filtrar('Paleozoico',this)">Paleozoico</button>
  <button class="filtro-btn" onclick="filtrar('Cenozoico',this)">Cenozoico</button>
</div>

<div id="contador">Mostrando <span id="cnt">0</span> yacimientos</div>

<div id="panel">
  <button class="panel-cerrar" onclick="cerrarPanel()">✕</button>
  <div id="panel-foto-wrap"></div>
  <div class="panel-body">
    <div id="p-badge" class="panel-era-badge"></div>
    <div id="p-nombre" class="panel-nombre"></div>
    <div id="p-pais"   class="panel-pais"></div>
    <div class="panel-divisor"></div>
    <div class="panel-seccion">Descripción</div>
    <div id="p-desc"   class="panel-desc"></div>
    <div class="panel-seccion">Hallazgos principales</div>
    <div id="p-hallazgos"></div>
    <div id="p-link"></div>
  </div>
</div>

<div id="leyenda">
  <div class="ley-titulo">Era geológica</div>
  <div class="ley-item"><div class="ley-dot" style="background:#c85030"></div> Triásico</div>
  <div class="ley-item"><div class="ley-dot" style="background:#2a9a40"></div> Jurásico</div>
  <div class="ley-item"><div class="ley-dot" style="background:#3aaa30"></div> Cretácico</div>
  <div class="ley-item"><div class="ley-dot" style="background:#c8a030"></div> Paleozoico</div>
  <div class="ley-item"><div class="ley-dot" style="background:#5a8aaa"></div> Cenozoico</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="../data.js"></script>
<script>

const ERA_COLORES = {
  "Triásico":   "#c85030",
  "Jurásico":   "#2a9a40",
  "Cretácico":  "#3aaa30",
  "Paleozoico": "#c8a030",
  "Cenozoico":  "#5a8aaa"
};

// ════════════════════════════════════════════
//  MAPA LEAFLET
// ════════════════════════════════════════════
const mapa = L.map('mapa', {
  center: [20, 10],
  zoom: 2,
  minZoom: 2,
  maxZoom: 10,
  zoomControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(mapa);

// ── MARCADORES ──
let marcadores = [];
let filtroActivo = 'todos';

function crearIcono(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${color};border:2px solid rgba(255,255,255,0.7);
      box-shadow:0 0 10px ${color},0 0 4px rgba(0,0,0,0.5);
      cursor:pointer;transition:transform 0.15s;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10],
  });
}

function renderMarcadores() {
  // Limpiar marcadores existentes
  marcadores.forEach(m => mapa.removeLayer(m));
  marcadores = [];

  const visibles = filtroActivo === 'todos'
    ? YACIMIENTOS
    : YACIMIENTOS.filter(y => y.era === filtroActivo);

  document.getElementById('cnt').textContent = visibles.length;

  visibles.forEach(y => {
    const m = L.marker([y.lat, y.lng], { icon: crearIcono(y.color) })
      .addTo(mapa)
      .bindPopup(`
        <div class="popup-nombre">${y.emoji} ${y.nombre}</div>
        <div class="popup-pais">${y.pais}</div>
        <div style="font-size:0.72rem;color:${y.color};letter-spacing:0.1em;text-transform:uppercase">${y.era}</div>
        <div class="popup-btn" onclick="abrirPanel(${y.id})">Ver detalles →</div>
      `, { maxWidth: 220 });

    m.on('click', () => m.openPopup());
    marcadores.push(m);
  });
}

function filtrar(era, btn) {
  filtroActivo = era;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  cerrarPanel();
  renderMarcadores();
}

// ════════════════════════════════════════════
//  PANEL LATERAL
// ════════════════════════════════════════════
function abrirPanel(id) {
  const y = YACIMIENTOS.find(x => x.id === id);
  if (!y) return;

  // Foto o fallback
  const fotoWrap = document.getElementById('panel-foto-wrap');
  fotoWrap.innerHTML = y.foto
    ? `<img class="panel-foto" src="${y.foto}" alt="${y.nombre}" onerror="this.parentElement.innerHTML='<div class=panel-foto-fallback>${y.emoji}</div>'">`
    : `<div class="panel-foto-fallback">${y.emoji}</div>`;

  // Badge era
  const badge = document.getElementById('p-badge');
  badge.textContent = y.era;
  badge.style.color       = y.color;
  badge.style.borderColor = y.color;
  badge.style.background  = `${y.color}18`;

  document.getElementById('p-nombre').textContent = y.nombre;
  document.getElementById('p-pais').innerHTML     = `<span>${y.pais}</span>`;
  document.getElementById('p-desc').textContent   = y.desc;

  document.getElementById('p-hallazgos').innerHTML = y.hallazgos.map(h => `
    <div class="hallazgo-item">
      <span class="hallazgo-emoji">${h.e}</span>
      <span>${h.t}</span>
    </div>
  `).join('');

  document.getElementById('p-link').innerHTML = y.link
    ? `<a class="panel-link" href="${y.link}" target="_blank">${y.linkText} ↗</a>` : '';

  document.getElementById('panel').classList.add('visible');
  mapa.flyTo([y.lat, y.lng], 5, { duration: 1.2 });
}

function cerrarPanel() {
  document.getElementById('panel').classList.remove('visible');
}

// Cerrar panel al clicar en el mapa
mapa.on('click', () => cerrarPanel());

// ════════════════════════════════════════════
//  NAV + IDIOMA + MODO
// ════════════════════════════════════════════
function renderNav() {
  const lang = getLang();
  const ids = ['explorer','landscapes','fossil','gallery','news','books','updates','comparator'];
  ids.forEach(id => {
    const el = document.getElementById('nav-' + id);
    if (el) el.textContent = t('nav_' + id);
  });
  const tl = document.getElementById('nav-timeline');
  if (tl) tl.textContent = lang === 'fr' ? 'Chronologie' : 'Timeline';
  const fm = document.getElementById('nav-fossilmap');
  if (fm) fm.textContent = lang === 'fr' ? 'Carte fossile' : 'Mapa fósil';
  document.querySelectorAll('.btn-idioma').forEach(b =>
    b.classList.toggle('activo', b.textContent.trim() === lang.toUpperCase())
  );
}

(function() {
  const modo = localStorage.getItem('modo') || 'oscuro';
  if (modo === 'claro') document.body.classList.add('claro');
  document.getElementById('btn-modo').textContent = modo === 'claro' ? '🌙' : '☀️';
})();
function toggleModo() {
  const esClaro = document.body.classList.toggle('claro');
  localStorage.setItem('modo', esClaro ? 'claro' : 'oscuro');
  document.getElementById('btn-modo').textContent = esClaro ? '🌙' : '☀️';
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
renderNav();
renderMarcadores();

</script>
</body>
</html>
