<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Size Comparator — Edu's Prehistoric Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .selector-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: start; max-width: 700px; margin-bottom: 3rem; }
    .selector-bloque { display: flex; flex-direction: column; gap: 0.5rem; position: relative; }
    .selector-label { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--acento); }
    .selector-input { background: var(--surface); border: 1px solid var(--borde); color: var(--texto); padding: 0.8rem 1rem; font-family: 'Crimson Pro', serif; font-size: 1rem; border-radius: 4px; outline: none; transition: border-color 0.2s; width: 100%; box-sizing: border-box; }
    .selector-input:focus { border-color: var(--acento); }
    .selector-input::placeholder { color: var(--texto-dim); }
    .selector-seleccionado { display: flex; align-items: center; gap: 0.6rem; background: var(--surface2); border: 1px solid var(--acento); border-radius: 4px; padding: 0.6rem 1rem; min-height: 44px; cursor: pointer; transition: all 0.2s; }
    .selector-seleccionado:hover { border-color: var(--acento2); }
    .sel-sil { width: 40px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sel-sil img { max-width: 40px; max-height: 30px; object-fit: contain; filter: invert(1); opacity: 0.9; }
    .sel-emoji-fb { font-size: 1.4rem; }
    .sel-nombre { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; }
    .sel-sci { font-size: 0.72rem; color: var(--texto-apagado); font-style: italic; }
    .dropdown { position: absolute; top: 100%; left: 0; right: 0; z-index: 100; background: var(--surface); border: 1px solid var(--acento); border-top: none; border-radius: 0 0 4px 4px; max-height: 260px; overflow-y: auto; display: none; }
    .dropdown.visible { display: block; }
    .dropdown-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--borde); }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover, .dropdown-item.highlighted { background: rgba(200,164,90,0.08); }
    .di-emoji { font-size: 1.3rem; flex-shrink: 0; }
    .di-nombre { font-size: 0.88rem; font-weight: 600; }
    .di-sci { font-size: 0.72rem; color: var(--texto-apagado); font-style: italic; }
    .dropdown-vacio { padding: 1rem; text-align: center; color: var(--texto-apagado); font-style: italic; font-size: 0.85rem; }
    .vs-badge { background: var(--surface2); border: 1px solid var(--borde); color: var(--texto-apagado); padding: 0.5rem 0.8rem; border-radius: 4px; font-family: 'Playfair Display', serif; font-size: 0.9rem; text-align: center; margin-top: 1.6rem; align-self: start; }
    .escena { background: var(--surface); border: 1px solid var(--borde); border-radius: 8px; padding: 2rem 2rem 0; margin-bottom: 2rem; overflow: hidden; position: relative; min-height: 340px; }
    .escena-cielo { position: absolute; inset: 0; bottom: 40px; background: linear-gradient(to bottom, rgba(10,12,20,0.8) 0%, rgba(20,30,50,0.3) 100%); pointer-events: none; }
    .escena-suelo { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to top, rgba(30,20,10,0.5), transparent); }
    .escena-suelo-linea { position: absolute; bottom: 40px; left: 0; right: 0; height: 1px; background: linear-gradient(to right, transparent, rgba(200,164,90,0.3), transparent); }
    .escena-figuras { display: flex; align-items: flex-end; justify-content: center; gap: 4rem; padding-bottom: 2.5rem; min-height: 300px; position: relative; z-index: 1; transition: opacity 0.3s, transform 0.3s; }
    .figura { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .figura-img-wrap { display: flex; align-items: flex-end; justify-content: center; }
    .figura-img-wrap img { object-fit: contain; filter: brightness(0) invert(1); opacity: 0.92; display: block; }
    .figura-img-wrap .figura-emoji-fb { line-height: 1; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.6)); }
    .figura-nombre { font-family: 'Playfair Display', serif; font-size: 0.82rem; font-weight: 700; text-align: center; max-width: 110px; }
    .figura-medida { font-size: 0.75rem; color: var(--acento); font-weight: 600; }
    .figura-humano .figura-nombre, .figura-humano .figura-medida { color: var(--texto-apagado); font-size: 0.7rem; }
    .figura-sombra { width: 60%; height: 6px; border-radius: 50%; background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%); margin-top: -4px; }
    .ratio-box { background: var(--surface2); border: 1px solid var(--borde); border-radius: 6px; padding: 1.5rem; text-align: center; margin-bottom: 2rem; }
    .ratio-numero { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: var(--acento); line-height: 1; margin-bottom: 0.3rem; }
    .ratio-desc { font-size: 0.88rem; color: var(--texto-apagado); font-style: italic; }
    .barra-comparacion { margin-bottom: 2rem; }
    .barra-titulo { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--texto-apagado); margin-bottom: 1rem; }
    .barra-item { margin-bottom: 0.8rem; }
    .barra-item-header { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 0.3rem; }
    .barra-item-nombre { color: var(--texto); }
    .barra-item-valor { color: var(--acento); font-weight: 600; }
    .barra-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .barra-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .barra-fill-1 { background: var(--acento); }
    .barra-fill-2 { background: var(--acento2); }
    .barra-fill-humano { background: var(--texto-dim); }
    .datos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    .datos-card { background: var(--surface); border: 1px solid var(--borde); border-radius: 6px; padding: 1.5rem; }
    .datos-card-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--borde); }
    .datos-card-sil { width: 48px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .datos-card-sil img { max-width: 48px; max-height: 36px; object-fit: contain; filter: invert(1); opacity: 0.8; }
    .datos-card-nombre { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
    .datos-card-sci { font-size: 0.78rem; color: var(--texto-apagado); font-style: italic; }
    .datos-fila { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid var(--borde); font-size: 0.85rem; }
    .datos-fila:last-child { border-bottom: none; }
    .datos-campo { color: var(--texto-apagado); font-size: 0.78rem; }
    .datos-valor { color: var(--texto); font-weight: 600; }
    .datos-valor.mayor { color: var(--acento); }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="../index.html"><span>🦕</span> Edu's Prehistoric Explorer</a>
    <ul class="nav-links">
      <li><a href="../explorer/index.html"   id="nav-explorer"></a></li>
      <li><a href="../landscapes/index.html" id="nav-landscapes"></a></li>
      <li><a href="../fossil/index.html"     id="nav-fossil"></a></li>
      <li><a href="../gallery/index.html"    id="nav-gallery"></a></li>
      <li><a href="../news/index.html"       id="nav-news"></a></li>
      <li><a href="../books/index.html"      id="nav-books"></a></li>
      <li><a href="../updates/index.html"    id="nav-updates"></a></li>
      <li><a href="index.html" class="activo" id="nav-comparator"></a></li>
      <li><a href="../timeline/index.html" id="nav-timeline"></a></li>
      <li><a href="../fossilmap/index.html" id="nav-fossilmap"></a></li>
    </ul>
    <div class="selector-idioma">
      <button class="btn-idioma" onclick="setLang('es')">ES</button>
      <button class="btn-idioma" onclick="setLang('fr')">FR</button>
    </div>
    <button class="btn-modo" id="btn-modo" onclick="toggleModo()" title="Cambiar modo"></button>
  </nav>

  <div class="contenedor">
    <p class="seccion-label" id="seccion-label"></p>
    <h1 class="seccion-titulo" id="seccion-titulo"></h1>
    <p class="seccion-sub" id="seccion-sub"></p>

    <div class="selector-grid">
      <div class="selector-bloque" id="bloque1">
        <div class="selector-label" id="label-a1"></div>
        <div class="selector-seleccionado" id="sel1-display" onclick="toggleDropdown(1)">
          <div class="sel-sil" id="sel1-sil"></div>
          <div><div class="sel-nombre" id="sel1-nombre"></div><div class="sel-sci" id="sel1-sci"></div></div>
        </div>
        <div class="dropdown" id="dropdown1">
          <input class="selector-input" id="input1" placeholder="Buscar..." oninput="filtrarDropdown(1)" onkeydown="navegarDropdown(event,1)" autocomplete="off">
          <div id="lista1"></div>
        </div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="selector-bloque" id="bloque2">
        <div class="selector-label" id="label-a2"></div>
        <div class="selector-seleccionado" id="sel2-display" onclick="toggleDropdown(2)">
          <div class="sel-sil" id="sel2-sil"></div>
          <div><div class="sel-nombre" id="sel2-nombre"></div><div class="sel-sci" id="sel2-sci"></div></div>
        </div>
        <div class="dropdown" id="dropdown2">
          <input class="selector-input" id="input2" placeholder="Buscar..." oninput="filtrarDropdown(2)" onkeydown="navegarDropdown(event,2)" autocomplete="off">
          <div id="lista2"></div>
        </div>
      </div>
    </div>

    <div class="escena">
      <div class="escena-cielo"></div>
      <div class="escena-figuras" id="escenaFiguras"></div>
      <div class="escena-suelo-linea"></div>
      <div class="escena-suelo"></div>
    </div>

    <div class="ratio-box" id="ratioBox"></div>
    <div class="barra-comparacion">
      <div class="barra-titulo" id="barra-titulo"></div>
      <div id="barras"></div>
    </div>
    <div class="datos-grid" id="datosGrid"></div>
  </div>

  <footer>
    <div class="footer-logo">🦕 Edu's Prehistoric Explorer</div>
    <p id="footer-copy"></p>
  </footer>

  <script src="../data.js"></script>
  <script>
    const TAMAÑOS = {
      1:  { largo: 12,   alto: 4.0 },
      2:  { largo: 5,    alto: 3.4 },
      3:  { largo: 18,   alto: 3.0 },
      4:  { largo: 9,    alto: 3.0 },
      5:  { largo: 5.5,  alto: 5.5 },
      6:  { largo: 2,    alto: 0.5 },
      7:  { largo: 9,    alto: 4.0 },
      8:  { largo: 25,   alto: 12.5 },
      9:  { largo: 15,   alto: 5.5 },
      10: { largo: 7,    alto: 1.7 },
      11: { largo: 25.5, alto: 4.5 },
      12: { largo: 11,   alto: 3.5 },
      13: { largo: 4.5,  alto: 2.0 },
      14: { largo: 9.5,  alto: 4.0 },
      15: { largo: 10,   alto: 3.0 },
      16: { largo: 1.05, alto: 0.3 },
      17: { largo: 33.3, alto: 16.5 },
      18: { largo: 16,   alto: 3.0 },
      19: { largo: 3.4,  alto: 1.5 },
      20: { largo: 4,    alto: 1.5 },
      21: { largo: 3,    alto: 1.7 },
      22: { largo: 0.9,  alto: 1.0 },
      23: { largo: 6.5,  alto: 3.5 },
      24: { largo: 5.5,  alto: 5.5 },
      25: { largo: 2.5,  alto: 1.2 },
      26: { largo: 4.5,  alto: 1.0 },
      27: { largo: 1.1,  alto: 1.1 },
      28: { largo: 7.5,  alto: 3.0 },   // Carnotaurus
      29: { largo: 9.5,  alto: 4.5 },   // Therizinosaurus
      30: { largo: 3.0,  alto: 0.8 },   // Ichthyosaurus
      31: { largo: 6.5,  alto: 1.5 },   // Pteranodon
      32: { largo: 2.0,  alto: 1.2 },   // Smilodon
    };

    const HUMANO = { largo: 1.75, alto: 1.75 };
    let seleccion = { 1: 1, 2: 2 };
    let highlightIdx = { 1: -1, 2: -1 };
    const silCache = {};
    let buildNumber = null;

    function getTamaño(id) { return TAMAÑOS[id] || { largo: 3, alto: 2 }; }

    async function getBuild() {
      if (buildNumber) return buildNumber;
      try {
        const res = await fetch('https://api.phylopic.org/');
        const data = await res.json();
        buildNumber = data.build;
        return buildNumber;
      } catch(e) { return 536; }
    }

    async function buscarSilueta(animal) {
      if (silCache[animal.id] !== undefined) return silCache[animal.id];

      const HARDCODED = {
        0:  'https://images.phylopic.org/images/f4a2eba1-0840-436b-813d-0c5bd1314002/raster/285x512.png',
        3:  'https://images.phylopic.org/images/993d4e41-51b3-4c59-a4ad-b3dbd482968e/raster/512x194.png',
        17: 'https://images.phylopic.org/images/f972f554-26cc-4c9c-93b0-0f58b6015de2/raster/512x315.png',
      };

      if (HARDCODED[animal.id] !== undefined) {
        silCache[animal.id] = HARDCODED[animal.id];
        return HARDCODED[animal.id];
      }

      try {
        const build = await getBuild();
        const genero = animal.cientifico ? animal.cientifico.split(' ')[0].toLowerCase() : '';
        if (!genero) { silCache[animal.id] = null; return null; }
        const res = await fetch(
          `https://api.phylopic.org/nodes?build=${build}&filter_name=${encodeURIComponent(genero)}&embed_items=true&embed_primaryImage=true&page=0`
        );
        if (!res.ok) { silCache[animal.id] = null; return null; }
        const data = await res.json();
        const items = data._embedded && data._embedded.items;
        if (!items || items.length === 0) { silCache[animal.id] = null; return null; }
        for (const item of items) {
          const img = item._embedded && item._embedded.primaryImage;
          if (!img) continue;
          const rasters = img._links && img._links.rasterFiles;
          if (!rasters || rasters.length === 0) continue;
          const file = rasters.find(f => f.href.includes('512')) || rasters[rasters.length - 1];
          if (file) { silCache[animal.id] = file.href; return file.href; }
        }
        silCache[animal.id] = null; return null;
      } catch(e) {
        silCache[animal.id] = null; return null;
      }
    }

    async function cargarSiluetaDisplay(n) {
      const a = ANIMALES.find(x => x.id === seleccion[n]);
      if (!a) return;
      const url = await buscarSilueta(a);
      const el = document.getElementById('sel' + n + '-sil');
      if (url) {
        el.innerHTML = `<img src="${url}" alt="${a.nombre}">`;
      } else {
        el.innerHTML = `<span class="sel-emoji-fb">${a.emoji}</span>`;
      }
    }

    function toggleDropdown(n) {
      const dd = document.getElementById('dropdown' + n);
      const otro = document.getElementById('dropdown' + (n === 1 ? 2 : 1));
      otro.classList.remove('visible');
      if (dd.classList.contains('visible')) {
        dd.classList.remove('visible');
      } else {
        dd.classList.add('visible');
        document.getElementById('input' + n).value = '';
        renderLista(n, ANIMALES);
        setTimeout(() => document.getElementById('input' + n).focus(), 50);
      }
    }

    function filtrarDropdown(n) {
      const q = document.getElementById('input' + n).value.toLowerCase();
      const lista = ANIMALES.filter(a => a.nombre.toLowerCase().includes(q) || a.cientifico.toLowerCase().includes(q));
      highlightIdx[n] = -1;
      renderLista(n, lista);
    }

    function renderLista(n, lista) {
      const el = document.getElementById('lista' + n);
      if (lista.length === 0) { el.innerHTML = `<div class="dropdown-vacio">Sin resultados</div>`; return; }
      el.innerHTML = lista.map((a, i) => `
        <div class="dropdown-item ${i === highlightIdx[n] ? 'highlighted' : ''}" onclick="seleccionar(${n}, ${a.id})">
          <span class="di-emoji">${a.emoji}</span>
          <div><div class="di-nombre">${a.nombre}</div><div class="di-sci">${a.cientifico}</div></div>
        </div>
      `).join('');
    }

    function seleccionar(n, id) {
      seleccion[n] = id;
      document.getElementById('dropdown' + n).classList.remove('visible');
      actualizarDisplay(n);
      actualizar();
    }

    function actualizarDisplay(n) {
      const a = ANIMALES.find(x => x.id === seleccion[n]);
      if (!a) return;
      document.getElementById('sel' + n + '-nombre').textContent = a.nombre;
      document.getElementById('sel' + n + '-sci').textContent    = a.cientifico;
      document.getElementById('sel' + n + '-sil').innerHTML = `<span class="sel-emoji-fb">${a.emoji}</span>`;
      cargarSiluetaDisplay(n);
    }

    function navegarDropdown(e, n) {
      const q = document.getElementById('input' + n).value.toLowerCase();
      const lista = ANIMALES.filter(a => a.nombre.toLowerCase().includes(q) || a.cientifico.toLowerCase().includes(q));
      if (e.key === 'ArrowDown') { highlightIdx[n] = Math.min(highlightIdx[n] + 1, lista.length - 1); renderLista(n, lista); }
      else if (e.key === 'ArrowUp') { highlightIdx[n] = Math.max(highlightIdx[n] - 1, 0); renderLista(n, lista); }
      else if (e.key === 'Enter' && highlightIdx[n] >= 0) { seleccionar(n, lista[highlightIdx[n]].id); }
      else if (e.key === 'Escape') { document.getElementById('dropdown' + n).classList.remove('visible'); }
    }

    document.addEventListener('click', e => {
      [1, 2].forEach(n => {
        if (!document.getElementById('bloque' + n).contains(e.target)) {
          document.getElementById('dropdown' + n).classList.remove('visible');
        }
      });
    });

    async function renderEscena(a1, a2, t1, t2) {
      const figuras = document.getElementById('escenaFiguras');
      figuras.style.opacity = '0';
      figuras.style.transform = 'translateY(10px)';

      const humanoObj = { id: 0, nombre: 'Humano', emoji: '🧍', cientifico: 'Homo sapiens' };
      const [url1, url2, urlH] = await Promise.all([
        buscarSilueta(a1), buscarSilueta(a2), buscarSilueta(humanoObj)
      ]);

      const maxAlto = Math.max(t1.alto, t2.alto, HUMANO.alto);
      const escalaH = 220 / maxAlto;

      function figHTML(a, url, alto, largo, esHumano) {
        const h = Math.max(15, Math.round(alto * escalaH));
        const w = Math.max(10, Math.round(largo * escalaH));
        const img = url
          ? `<img src="${url}" style="width:${w}px;height:${h}px;" alt="${a.nombre}">`
          : `<span class="figura-emoji-fb" style="font-size:${Math.max(20,h*0.8)}px">${a.emoji}</span>`;
        const medida = esHumano ? `${HUMANO.alto} m` : `${alto} m · ${largo} m`;
        return `
          <div class="figura ${esHumano ? 'figura-humano' : ''}">
            <div class="figura-img-wrap">${img}</div>
            <div class="figura-sombra"></div>
            <div class="figura-nombre">${a.nombre}</div>
            <div class="figura-medida">${medida}</div>
          </div>
        `;
      }

      figuras.innerHTML =
        figHTML(humanoObj, urlH, HUMANO.alto, HUMANO.largo * 0.4, true) +
        figHTML(a1, url1, t1.alto, t1.largo, false) +
        figHTML(a2, url2, t2.alto, t2.largo, false);

      setTimeout(() => {
        figuras.style.opacity = '1';
        figuras.style.transform = 'translateY(0)';
      }, 50);
    }

    function renderPagina() {
      const lang = getLang();
      document.getElementById('nav-explorer').textContent   = t('nav_explorer');
      document.getElementById('nav-landscapes').textContent = t('nav_landscapes');
      document.getElementById('nav-fossil').textContent     = t('nav_fossil');
      document.getElementById('nav-gallery').textContent    = t('nav_gallery');
      document.getElementById('nav-news').textContent       = t('nav_news');
      document.getElementById('nav-books').textContent      = t('nav_books');
      document.getElementById('nav-updates').textContent    = t('nav_updates');
      document.getElementById('nav-comparator').textContent = t('nav_comparator');
      document.getElementById('nav-timeline').textContent = getLang() === 'fr' ? 'Chronologie' : 'Timeline';
      document.getElementById('nav-fossilmap').textContent = getLang() === 'fr' ? 'Carte fossile' : 'Mapa fósil';
      document.querySelectorAll('.btn-idioma').forEach(b => {
        b.classList.remove('activo');
        if (b.textContent.trim() === lang.toUpperCase()) b.classList.add('activo');
      });
      document.getElementById('seccion-label').textContent  = t('comparator_label');
      document.getElementById('seccion-titulo').textContent = t('comparator_titulo');
      document.getElementById('seccion-sub').textContent    = t('comparator_sub');
      document.getElementById('footer-copy').textContent    = t('footer_copy');
      document.getElementById('label-a1').textContent       = t('comparator_animal1');
      document.getElementById('label-a2').textContent       = t('comparator_animal2');
      document.getElementById('barra-titulo').textContent   = t('comparator_barras');
      actualizarDisplay(1);
      actualizarDisplay(2);
      actualizar();
    }

    async function actualizar() {
      const id1 = seleccion[1];
      const id2 = seleccion[2];
      const a1  = ANIMALES.find(a => a.id === id1);
      const a2  = ANIMALES.find(a => a.id === id2);
      const t1  = getTamaño(id1);
      const t2  = getTamaño(id2);

      renderEscena(a1, a2, t1, t2);

      const mayor = t1.largo >= t2.largo ? a1 : a2;
      const menor = t1.largo < t2.largo  ? a1 : a2;
      const ratio = (Math.max(t1.largo, t2.largo) / Math.min(t1.largo, t2.largo)).toFixed(1);
      document.getElementById('ratioBox').innerHTML = `
        <div class="ratio-numero">×${ratio}</div>
        <div class="ratio-desc">${mayor.nombre} es ${ratio} veces más largo que ${menor.nombre}</div>
      `;

      const maxB = Math.max(t1.largo, t2.largo, HUMANO.largo);
      document.getElementById('barras').innerHTML = `
        <div class="barra-item">
          <div class="barra-item-header"><span class="barra-item-nombre">${a1.emoji} ${a1.nombre}</span><span class="barra-item-valor">${t1.largo} m</span></div>
          <div class="barra-track"><div class="barra-fill barra-fill-1" style="width:${(t1.largo/maxB*100).toFixed(1)}%"></div></div>
        </div>
        <div class="barra-item">
          <div class="barra-item-header"><span class="barra-item-nombre">${a2.emoji} ${a2.nombre}</span><span class="barra-item-valor">${t2.largo} m</span></div>
          <div class="barra-track"><div class="barra-fill barra-fill-2" style="width:${(t2.largo/maxB*100).toFixed(1)}%"></div></div>
        </div>
        <div class="barra-item">
          <div class="barra-item-header"><span class="barra-item-nombre">🧍 Humano (referencia)</span><span class="barra-item-valor">${HUMANO.largo} m</span></div>
          <div class="barra-track"><div class="barra-fill barra-fill-humano" style="width:${(HUMANO.largo/maxB*100).toFixed(1)}%"></div></div>
        </div>
      `;

      async function cardDatos(a, ta, tb) {
        const url = await buscarSilueta(a);
        const silHTML = url
          ? `<div class="datos-card-sil"><img src="${url}" alt="${a.nombre}"></div>`
          : `<div style="font-size:1.8rem">${a.emoji}</div>`;
        return `
          <div class="datos-card">
            <div class="datos-card-header">
              ${silHTML}
              <div><div class="datos-card-nombre">${a.nombre}</div><div class="datos-card-sci">${a.cientifico}</div></div>
            </div>
            <div class="datos-fila"><div class="datos-campo">${t('campo_dieta')}</div><div class="datos-valor">${a.dieta}</div></div>
            <div class="datos-fila"><div class="datos-campo">${t('campo_peso')}</div><div class="datos-valor">${a.peso}</div></div>
            <div class="datos-fila"><div class="datos-campo">Largo</div><div class="datos-valor ${ta.largo>=tb.largo?'mayor':''}">${ta.largo} m</div></div>
            <div class="datos-fila"><div class="datos-campo">Alto</div><div class="datos-valor ${ta.alto>=tb.alto?'mayor':''}">${ta.alto} m</div></div>
            <div class="datos-fila"><div class="datos-campo">${t('campo_periodo')}</div><div class="datos-valor">${a.periodo}</div></div>
            <div class="datos-fila"><div class="datos-campo">${t('campo_habitat')}</div><div class="datos-valor">${a.habitat}</div></div>
          </div>
        `;
      }

      const [card1, card2] = await Promise.all([cardDatos(a1,t1,t2), cardDatos(a2,t2,t1)]);
      document.getElementById('datosGrid').innerHTML = card1 + card2;
    }

    renderPagina();
  </script>
<script>
  (function() {
    const modo = localStorage.getItem('modo') || 'oscuro';
    if (modo === 'claro') document.body.classList.add('claro');
    document.getElementById('btn-modo').textContent = modo === 'claro' ? '🌙' : '☀️';
  })();
  function toggleModo() {
    const esClaro = document.body.classList.toggle('claro');
    localStorage.setItem('modo', esClaro ? 'claro' : 'oscuro');
    document.getElementById('btn-modo').textContent = esClaro ? '🌙' : '☀️';
  }
</script>
</body>
</html>
